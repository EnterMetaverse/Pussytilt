<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PussyTilt: Refined Physics</title>
    <style>
        :root { --gold: #f9ca24; --diamond: #70a1ff; --green: #2ecc71; --yellow: #f1c40f; --red: #e74c3c; }
        body { margin: 0; overflow: hidden; background-color: #7cb342; background-image: radial-gradient(#ffffff 2px, transparent 2px), radial-gradient(#f9ca24 2px, transparent 2px); background-size: 50px 50px; background-position: 0 0, 25px 25px; font-family: 'Arial Rounded MT Bold', sans-serif; touch-action: none; }
        
        /* THE FIXED, WOBBLE-FREE TOP BAR */
        #game-ui { 
            position: fixed; top: 0; left: 0; width: 100%; height: 60px; 
            background: rgba(0, 0, 0, 0.85); border-bottom: 3px solid var(--gold);
            display: grid; grid-template-columns: 1fr 1fr 1fr; align-items: center; text-align: center;
            font-size: 26px; z-index: 9999; color: white; text-shadow: 2px 2px 4px #000;
            font-variant-numeric: tabular-nums; /* Prevents text shifting */
            margin: 0; padding: 0;
        }
        
        .sprite { position: absolute; display: flex; justify-content: center; align-items: center; pointer-events: none; transform: translate(-50%, -50%); }
        #cat { font-size: 70px; z-index: 5; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3)); transition: opacity 0.2s; }
        .tree { font-size: 110px; z-index: 2; }
        .yarn { font-size: 60px; }
        .water { font-size: 30px; filter: drop-shadow(0 0 8px #2980b9); }
        .fishbone { font-size: 50px; filter: drop-shadow(0 0 10px white); }

        /* CARTOON ANIMATION */
        @keyframes cartoonDrop { 0% { transform: translateY(-500px) scale(0.5); opacity: 0; } 60% { transform: translateY(30px) scale(1.2); opacity: 1; } 80% { transform: translateY(-10px) scale(0.9); } 100% { transform: translateY(0) scale(1); } }
        @keyframes wobble { 0%, 100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }
        #title { font-size: 60px; color: var(--gold); text-shadow: 4px 4px 0px #000; animation: cartoonDrop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, wobble 2s ease-in-out infinite 0.8s; margin-bottom: 10px; }

        #overlay { position: fixed; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.95); color: white; z-index: 10000; text-align: center; padding: 20px; }
        .btn { padding: 15px 35px; font-size: 20px; border-radius: 50px; border: none; color: white; margin: 8px; font-weight: bold; width: 240px; box-shadow: 0 6px 0 rgba(0,0,0,0.3); cursor: pointer; }
        
        /* METRONOME */
        #wiz-box { background: #2c3e50; padding: 20px; border-radius: 20px; border: 4px solid var(--gold); display: none; margin-bottom: 20px; }
        #lever-track { width: 300px; height: 35px; background: #444; border-radius: 10px; position: relative; margin: 20px 0; overflow: hidden; border: 3px solid #666;}
        .zone { height: 100%; position: absolute; }
        .red-zone { width: 40px; background: var(--red); }
        .yellow-zone { width: 70px; background: var(--yellow); }
        .green-zone { width: 80px; background: var(--green); left: 110px; }
        #apple { font-size: 30px; position: absolute; top: -4px; z-index: 10; transition: left 0.05s linear; }

        #video-container { position: fixed; inset: 0; background: black; display: none; z-index: 10001; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .flash-red { background: #ff4757 !important; }
        .timer-red { color: var(--red) !important; font-size: 35px !important; transition: 0.2s; }
    </style>
</head>
<body>

    <div id="game-ui">
        <div>⏳ <span id="timer">30</span>s</div>
        <div>🧶 <span id="score">0</span></div>
        <div>🏆 <span id="high-score">0</span></div>
    </div>

    <div id="video-container"><video id="end-video" playsinline muted><source src="https://videos.pexels.com/video-files/3015488/3015488-uhd_2560_1440_24fps.mp4" type="video/mp4"></video></div>

    <div id="overlay">
        <div id="menu-content">
            <h1 id="title">PussyTilt</h1>
            <p id="stats-display" style="font-size: 22px; margin-bottom: 15px;"></p>
            
            <div id="wiz-box">
                <p id="wiz-timer" style="color:var(--red); font-weight: bold;">HURRY! 5s</p>
                <div id="lever-track">
                    <div class="zone red-zone" style="left:0"></div>
                    <div class="zone yellow-zone" style="left:40px"></div>
                    <div class="zone green-zone"></div>
                    <div class="zone yellow-zone" style="left:190px"></div>
                    <div class="zone red-zone" style="right:0"></div>
                    <div id="apple">🍏</div>
                </div>
                <button class="btn" style="background:var(--diamond)" id="wiz-stop">STOP APPLE!</button>
            </div>

            <div id="menu-btns">
                <button class="btn" style="background:#4CAF50" id="action-btn">START YARN HUNT</button>
            </div>
            <div style="font-size: 11px; margin-top: 20px; color: #777;">
                Tilt my Pussy | Kinetic Art Labs by Dr John Holder
            </div>
        </div>
    </div>

    <div id="cat" class="sprite">🐈</div>

    <script>
        const cat = document.getElementById('cat'), scoreEl = document.getElementById('score'), timerEl = document.getElementById('timer'), overlay = document.getElementById('overlay'), actionBtn = document.getElementById('action-btn'), statsDisplay = document.getElementById('stats-display'), wizBox = document.getElementById('wiz-box'), apple = document.getElementById('apple'), videoCont = document.getElementById('video-container'), video = document.getElementById('end-video');
        
        let score = 0, timeLeft = 30, active = false, mode = "yarn", items = [], trees = [];
        let catX = window.innerWidth / 2, catY = window.innerHeight / 2;
        
        // REFINED PHYSICS VARIABLES
        let velX = 0, velY = 0;
        let tiltAccelX = 0, tiltAccelY = 0;
        
        let applePos = 0, appleDir = 1, wizActive = false;
        let waterCooldown = false; 

        let highScore = localStorage.getItem('pt_deluxe_score') || 0;
        document.getElementById('high-score').innerText = highScore;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(f, t, d, s=0, v=0.1) {
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            if(s) o.frequency.exponentialRampToValueAtTime(f+s, audioCtx.currentTime+d);
            g.gain.setValueAtTime(v, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+d);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+d);
        }

        function playCheer() {
            const bSize = audioCtx.sampleRate * 1.5; const b = audioCtx.createBuffer(1, bSize, audioCtx.sampleRate);
            const data = b.getChannelData(0); for (let i=0; i<bSize; i++) data[i] = Math.random() * 2 - 1;
            const noise = audioCtx.createBufferSource(); noise.buffer = b;
            const filter = audioCtx.createBiquadFilter(); filter.type = 'highpass'; filter.frequency.value = 1000;
            const gain = audioCtx.createGain(); gain.gain.setValueAtTime(0.05, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
            noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination); noise.start();
            [400, 600, 800].forEach((f, i) => setTimeout(() => playSfx(f, 'sine', 0.5, 400, 0.05), i * 100));
        }

        function spawnTrees() {
            trees.forEach(t => t.el.remove()); trees = [];
            for(let i=0; i<5; i++) {
                const el = document.createElement('div'); el.className = 'sprite tree'; el.innerHTML = '🌲'; document.body.appendChild(el);
                let tx = Math.random() * (window.innerWidth - 140) + 70;
                let ty = Math.random() * (window.innerHeight - 250) + 120; // Stays clear of 60px top bar
                el.style.left = tx + 'px'; el.style.top = ty + 'px';
                trees.push({el, x: tx, y: ty});
            }
        }

        function createItem(type, emoji, speed) {
            const el = document.createElement('div'); el.className = 'sprite ' + type; el.innerHTML = emoji; document.body.appendChild(el);
            let radius = type === 'yarn' ? 30 : (type === 'fishbone' ? 25 : 15);
            let x = Math.random() * (window.innerWidth - radius*2) + radius;
            let y = Math.random() * (window.innerHeight - 60 - radius*2) + 60 + radius;
            items.push({ el, type, baseSpeed: speed, radius, x, y, dx: (Math.random()-0.5)*speed, dy: (Math.random()-0.5)*speed });
        }

        // TILT INPUT (70% SLOWER)
        window.addEventListener('deviceorientation', (e) => {
            if (active) {
                // Mapped to acceleration instead of direct position. Multiplier severely reduced for heavy feel.
                let g = Math.max(-45, Math.min(45, e.gamma));
                let b = Math.max(-45, Math.min(45, e.beta));
                tiltAccelX = g * 0.04; 
                tiltAccelY = b * 0.04;
            }
        });

        function gameLoop() {
            if (active) {
                // 1. APPLY PHYSICS TO CAT
                velX += tiltAccelX;
                velY += tiltAccelY;

                // Friction (Momentum decay)
                velX *= 0.94;
                velY *= 0.94;

                let nextX = catX + velX;
                let nextY = catY + velY;

                // 2. TREE COLLISION (Cat bounces off trees)
                let hitTree = false;
                trees.forEach(t => {
                    if (Math.hypot(nextX - t.x, nextY - t.y) < 70) {
                        hitTree = true;
                        let angle = Math.atan2(nextY - t.y, nextX - t.x);
                        velX = Math.cos(angle) * 3; // Push back velocity
                        velY = Math.sin(angle) * 3;
                    }
                });

                if (!hitTree) {
                    catX = nextX;
                    catY = nextY;
                }

                // 3. ABSOLUTE SCREEN BOUNDARIES & BOUNCING
                const catRadius = 35;
                const topUIBar = 60;

                // Left/Right Walls
                if (catX <= catRadius) { 
                    catX = catRadius; 
                    velX *= -0.6; // Bounce with energy loss
                } else if (catX >= window.innerWidth - catRadius) { 
                    catX = window.innerWidth - catRadius; 
                    velX *= -0.6; 
                }

                // Top/Bottom Walls
                if (catY <= topUIBar + catRadius) { 
                    catY = topUIBar + catRadius; 
                    velY *= -0.6; 
                } else if (catY >= window.innerHeight - catRadius) { 
                    catY = window.innerHeight - catRadius; 
                    velY *= -0.6; 
                }
                
                cat.style.left = catX + 'px'; cat.style.top = catY + 'px';

                // 4. MOVE ITEMS SAFELY
                const elapsed = mode === "yarn" ? 30 - timeLeft : 10 - timeLeft;
                const speedMult = mode === "yarn" ? 1.0 + (Math.abs(Math.sin(elapsed*0.2))*0.5) : 1.2;
                
                items.forEach(item => {
                    item.x += (item.dx * speedMult); item.y += (item.dy * speedMult);
                    
                    // Items bounce strictly inside screen
                    if (item.x <= item.radius) { item.x = item.radius; item.dx *= -1; }
                    else if (item.x >= window.innerWidth - item.radius) { item.x = window.innerWidth - item.radius; item.dx *= -1; }
                    
                    if (item.y <= topUIBar + item.radius) { item.y = topUIBar + item.radius; item.dy *= -1; }
                    else if (item.y >= window.innerHeight - item.radius) { item.y = window.innerHeight - item.radius; item.dy *= -1; }
                    
                    item.el.style.left = item.x + 'px'; item.el.style.top = item.y + 'px';

                    // 5. COLLISION DETECTION (Score & Water)
                    if (Math.hypot(catX - item.x, catY - item.y) < (catRadius + item.radius - 10)) {
                        if (item.type === 'yarn') {
                            score++; scoreEl.innerText = score; playSfx(600,'sine',0.2,200);
                            item.el.remove(); items = items.filter(i => i !== item); createItem('yarn', '🧶', 2.5); 
                        } else if (item.type === 'fishbone') {
                            score++; scoreEl.innerText = score; playSfx(800,'triangle',0.2,300);
                            item.el.remove(); items = items.filter(i => i !== item); createItem('fishbone', '🦴', 3.5);
                        } else if (item.type === 'water') {
                            if (!waterCooldown) {
                                score = Math.max(0, score-3); scoreEl.innerText = score; playSfx(150,'sawtooth',0.4);
                                document.body.classList.add('flash-red'); setTimeout(()=>document.body.classList.remove('flash-red'),100);
                                
                                // INVINCIBILITY 1 SECOND
                                waterCooldown = true;
                                cat.style.opacity = '0.4';
                                setTimeout(() => { waterCooldown = false; cat.style.opacity = '1'; }, 1000);
                            }
                        }
                    }
                });
            }
            if(wizActive) {
                applePos += 5 * appleDir;
                if(applePos >= 270 || applePos <= 0) appleDir *= -1;
                apple.style.left = applePos + 'px';
            }
            requestAnimationFrame(gameLoop);
        }

        actionBtn.onclick = () => {
            audioCtx.resume();
            if(mode === "yarn") {
                overlay.style.display = 'none'; active = true; spawnTrees();
                score = 0; scoreEl.innerText = 0;
                velX = 0; velY = 0; // Reset physics
                catX = window.innerWidth / 2; catY = window.innerHeight / 2;
                for(let i=0; i<3; i++) createItem('yarn', '🧶', 2.5); createItem('water', '💧', 1.8);
                const t = setInterval(() => {
                    if(active) {
                        timeLeft--; timerEl.innerText = timeLeft;
                        if(timeLeft <= 0) { clearInterval(t); active = false; playCheer(); startMetronome(); }
                    }
                }, 1000);
            } else if (mode === "fish") {
                overlay.style.display = 'none'; timeLeft = 10; timerEl.innerText = 10;
                active = true; items.forEach(i => i.el.remove()); items = [];
                for(let i=0; i<4; i++) createItem('fishbone', '🦴', 4);
                const ft = setInterval(() => {
                    if(active) {
                        timeLeft--; timerEl.innerText = timeLeft;
                        if (timeLeft <= 3 && timeLeft > 0) { playSfx(80, 'sine', 0.1, 0, 0.3); timerEl.classList.add('timer-red'); }
                        if(timeLeft <= 0) { clearInterval(ft); active = false; playCheer(); timerEl.classList.remove('timer-red'); endSequence(); }
                    }
                }, 1000);
            }
        };

        function startMetronome() {
            setTimeout(() => {
                statsDisplay.innerHTML = `YARN SCORE: ${score}<br>Catch the Apple!`;
                actionBtn.style.display = 'none'; wizBox.style.display = 'block'; wizActive = true;
                let c = 5; document.getElementById('wiz-timer').innerText = `HURRY! ${c}s`;
                const ci = setInterval(() => {
                    c--; document.getElementById('wiz-timer').innerText = `HURRY! ${c}s`;
                    if(c <= 0 || !wizActive) { clearInterval(ci); if(wizActive) resolveWiz(0); }
                }, 1000);
            }, 1500);
            overlay.style.display = 'flex';
        }

        document.getElementById('wiz-stop').onclick = () => {
            let bonus = 0;
            if (applePos >= 110 && applePos <= 190) { bonus = 10; playCheer(); }
            else if ((applePos >= 40 && applePos < 110) || (applePos > 190 && applePos <= 260)) bonus = 5;
            else bonus = 0;
            resolveWiz(bonus);
        };

        function resolveWiz(bonus) {
            wizActive = false; score += bonus; scoreEl.innerText = score;
            wizBox.style.display = 'none';
            statsDisplay.innerHTML = `BONUS: +${bonus}!<br>NEXT: 10s FISHBONE BLITZ`;
            actionBtn.innerText = "START FISHING"; actionBtn.style.display = 'inline-block';
            mode = "fish";
        }

        function endSequence() {
            videoCont.style.display = 'flex'; video.play();
            setTimeout(() => {
                videoCont.style.display = 'none';
                if(score > highScore) { highScore = score; localStorage.setItem('pt_deluxe_score', score); document.getElementById('high-score').innerText = highScore; }
                statsDisplay.innerHTML = `FINAL TOTAL: ${score}`;
                actionBtn.innerText = "PLAY AGAIN";
                actionBtn.onclick = () => location.reload();
                
                if(!document.getElementById('sh-btn')) {
                    const btns = [['#008CBA', 'SHARE', () => navigator.share({text:`🐈 Can you beat me? I got 🧶 ${score} in PussyTilt!`})], ['#e67e22', 'DONATE', () => window.open('https://paypal.me/yourlink','_blank')]];
                    btns.forEach(b => {
                        const el = document.createElement('button'); el.className='btn'; el.id=b[1]==='SHARE'?'sh-btn':'dn-btn';
                        el.style.background=b[0]; el.innerText=b[1]; el.onclick=b[2];
                        document.getElementById('menu-btns').appendChild(el);
                    });
                }
                overlay.style.display = 'flex';
            }, 6000);
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
