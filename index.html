<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PussyTilt: Green Apple</title>
    <style>
        :root { --gold: #f9ca24; --diamond: #70a1ff; --yellow: #f1c40f; --green: #2ecc71; --red: #e74c3c; }
        body { margin: 0; overflow: hidden; background-color: #7cb342; background-image: radial-gradient(#ffffff 2px, transparent 2px), radial-gradient(#f9ca24 2px, transparent 2px); background-size: 50px 50px; background-position: 0 0, 25px 25px; font-family: 'Arial Rounded MT Bold', sans-serif; touch-action: none; }
        #game-ui { position: fixed; top: 15px; width: 100%; display: flex; justify-content: space-around; font-size: 26px; z-index: 10; color: white; text-shadow: 3px 3px 0px rgba(0,0,0,0.3); pointer-events: none; }
        .sprite { position: absolute; display: flex; justify-content: center; align-items: center; pointer-events: none; transform: translate(-50%, -50%); }
        #cat { font-size: 70px; z-index: 5; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3)); }
        .tree { font-size: 110px; z-index: 2; transition: opacity 0.4s; }
        .yarn { font-size: 60px; }
        .water { font-size: 30px; filter: drop-shadow(0 0 8px #2980b9); }
        #overlay { position: fixed; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.9); color: white; z-index: 30; text-align: center; padding: 20px; }
        #video-container { position: fixed; inset: 0; background: black; display: none; z-index: 40; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .btn { padding: 15px 35px; font-size: 20px; border-radius: 50px; border: none; color: white; margin: 8px; font-weight: bold; width: 240px; box-shadow: 0 6px 0 rgba(0,0,0,0.3); cursor: pointer; }
        .btn-play { background: #4CAF50; }
        
        /* Metronome Post-Game UI */
        #wiz-box { background: #2c3e50; padding: 20px; border-radius: 20px; border: 4px solid var(--gold); display: none; margin-bottom: 20px; }
        #lever-track { width: 300px; height: 35px; background: #444; border-radius: 10px; position: relative; margin: 20px 0; overflow: hidden; border: 3px solid #666;}
        .zone { height: 100%; position: absolute; top: 0; }
        .red-zone { width: 40px; background: var(--red); }
        .yellow-zone { width: 70px; background: var(--yellow); }
        .green-zone { width: 80px; background: var(--green); left: 110px; }
        #lever-indicator { font-size: 30px; position: absolute; top: -5px; left: 0; z-index: 10; transition: left 0.05s linear;}
        
        #prize-stage { display: none; flex-direction: column; align-items: center; }
        .diamond-row { display: flex; gap: 20px; margin: 20px; }
        .diamond { font-size: 60px; cursor: pointer; filter: drop-shadow(0 0 10px var(--diamond)); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .expand-out { transform: scale(30) !important; opacity: 0; transition: transform 0.8s, opacity 0.8s; }
        
        /* Special Effect for Green 10 */
        .shake { animation: shake 0.5s; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 10% { transform: translate(-1px, -2px); } 30% { transform: translate(3px, 2px); } 50% { transform: translate(-1px, 2px); } 100% { transform: translate(1px, -2px); } }
    </style>
</head>
<body>

    <div id="game-ui">
        <div>⏳ <span id="timer">60</span>s</div>
        <div>🧶 <span id="score">0</span></div>
        <div>🏆 <span id="high-score">0</span></div>
    </div>

    <div id="video-container"><video id="end-video" playsinline muted><source src="https://videos.pexels.com/video-files/3015488/3015488-uhd_2560_1440_24fps.mp4" type="video/mp4"></video></div>

    <div id="overlay">
        <div id="main-menu">
            <h1 style="font-size: 50px; color: var(--gold);">PussyTilt</h1>
            <p id="stats-display" style="font-size: 24px;"></p>
            <button class="btn btn-play" id="start-btn">START GAME</button>
            <div style="font-size: 12px; margin-top: 20px; color: #888;">Tilt my Pussy | Kinetic Art Labs by Dr John Holder</div>
        </div>

        <div id="wiz-box">
            <h2 style="color:var(--gold)">CAT REACTIONS!</h2>
            <p id="wiz-timer" style="color:var(--red); font-size: 20px;">HURRY: 5s</p>
            <div id="lever-track">
                <div class="zone red-zone" style="left:0"></div>
                <div class="zone yellow-zone" style="left:40px"></div>
                <div class="zone green-zone"></div>
                <div class="zone yellow-zone" style="left:190px"></div>
                <div class="zone red-zone" style="right:0"></div>
                <div id="lever-indicator">🍏</div>
            </div>
            <button class="btn btn-play" id="wiz-stop" style="background:var(--diamond)">STOP!</button>
        </div>

        <div id="prize-stage">
            <h2 id="prize-text" style="color:var(--gold); margin-bottom: 20px;">BONUS CLAIM!</h2>
            <div class="diamond-row">
                <div class="diamond" onclick="claimPrize(this)">💎</div>
                <div class="diamond" onclick="claimPrize(this)">💎</div>
                <div class="diamond" onclick="claimPrize(this)">💎</div>
            </div>
        </div>
    </div>

    <div id="cat" class="sprite">🐈</div>

    <script>
        const cat = document.getElementById('cat'), scoreEl = document.getElementById('score'), highScoreEl = document.getElementById('high-score'), timerEl = document.getElementById('timer'), overlay = document.getElementById('overlay'), videoCont = document.getElementById('video-container'), video = document.getElementById('end-video'), startBtn = document.getElementById('start-btn'), statsDisplay = document.getElementById('stats-display'), wizBox = document.getElementById('wiz-box'), mainMenu = document.getElementById('main-menu'), leverInd = document.getElementById('lever-indicator'), prizeStage = document.getElementById('prize-stage'), prizeText = document.getElementById('prize-text'), wizTimerEl = document.getElementById('wiz-timer');
        
        let score = 0, timeLeft = 60, active = false, isFlashing = false, goldSpawned = false, catX = window.innerWidth / 2, catY = window.innerHeight / 2, items = [], trees = [];
        let wizActive = false, leverPos = 0, leverDir = 1, currentBonus = 0, wizCountdown = 5, wizInterval;

        let highScore = localStorage.getItem('pt_deluxe_score') || 0;
        highScoreEl.innerText = highScore;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(f, t, d, s = 0, vol = 0.1) {
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = t; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            if(s) o.frequency.exponentialRampToValueAtTime(f + s, audioCtx.currentTime + d);
            g.gain.setValueAtTime(vol, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + d);
        }

        function playRegisterDing() {
            playSound(1200, 'sine', 0.6, 0, 0.2);
            setTimeout(() => playSound(2400, 'sine', 0.3, 0, 0.1), 20);
        }

        function playVictory() {
            [523, 659, 783, 1046].forEach((f, i) => setTimeout(() => playSound(f, 'triangle', 0.2), i * 100));
        }

        function spawnTrees() {
            trees.forEach(t => t.el.remove()); trees = [];
            for(let i=0; i<5; i++) {
                const el = document.createElement('div'); el.className = 'sprite tree'; el.innerHTML = '🌲'; document.body.appendChild(el);
                let tx = Math.random() * (window.innerWidth - 100) + 50, ty = Math.random() * (window.innerHeight - 200) + 100;
                el.style.left = tx + 'px'; el.style.top = ty + 'px';
                trees.push({el, x: tx, y: ty});
            }
        }

        function createItem(type, emoji, speed) {
            const el = document.createElement('div'); el.className = 'sprite ' + type; el.innerHTML = emoji; document.body.appendChild(el);
            items.push({ el, type, baseSpeed: speed, x: Math.random()*window.innerWidth, y: Math.random()*window.innerHeight, dx: (Math.random()-0.5)*speed, dy: (Math.random()-0.5)*speed });
        }

        window.addEventListener('deviceorientation', (e) => {
            if (!active || isFlashing) return;
            let moveX = (e.gamma * 1.8), moveY = (e.beta * 1.8);
            let nextX = catX + moveX, nextY = catY + moveY;
            let hitTree = trees.some(t => Math.hypot(nextX - t.x, nextY - t.y) < 75);
            if (!hitTree) {
                catX = Math.max(40, Math.min(window.innerWidth - 40, nextX));
                catY = Math.max(40, Math.min(window.innerHeight - 40, nextY));
            }
            cat.style.left = catX + 'px'; cat.style.top = catY + 'px';
        });

        function gameLoop() {
            if (active && !isFlashing) {
                const totalPassed = 60 - timeLeft;
                const speedMult = 1.0 + (Math.abs(Math.sin(totalPassed * 0.2)) * 0.5); 
                if(totalPassed >= 30) {
                    let grow = 30 + ((totalPassed - 30) / 30) * 30;
                    items.filter(i=>i.type==='water').forEach(w => w.el.style.fontSize = grow + 'px');
                }
                if (timeLeft <= 10 && !goldSpawned) { createItem('gold-yarn', '🌟', 6); goldSpawned = true; }
                items.forEach(item => {
                    let currentSpeed = item.type === 'yarn' ? item.baseSpeed * speedMult : item.baseSpeed;
                    item.x += (item.dx / item.baseSpeed) * currentSpeed; item.y += (item.dy / item.baseSpeed) * currentSpeed;
                    if (item.x < 30 || item.x > window.innerWidth - 30) item.dx *= -1;
                    if (item.y < 30 || item.y > window.innerHeight - 30) item.dy *= -1;
                    item.el.style.left = item.x + 'px'; item.el.style.top = item.y + 'px';
                    let hitZone = item.type === 'water' ? (parseFloat(item.el.style.fontSize)||30) + 10 : 65; 
                    if (Math.hypot(catX - item.x, catY - item.y) < hitZone) {
                        if (item.type === 'yarn') { score++; playSound(600, 'sine', 0.2, 300); respawnItem(item); }
                        else if (item.type === 'gold-yarn') { score += 10; playSound(1000, 'triangle', 0.5, 500); item.el.remove(); items = items.filter(i=>i!==item); }
                        else if (item.type === 'water') { triggerWaterHit(); }
                        scoreEl.innerText = score;
                    }
                });
            }
            if(wizActive) {
                leverPos += 5 * leverDir; // SLOWED DOWN TO 5
                if(leverPos >= 275 || leverPos <= 0) { leverDir *= -1; playSound(200, 'sine', 0.04); }
                leverInd.style.left = leverPos + 'px';
            }
            requestAnimationFrame(gameLoop);
        }

        function triggerWaterHit() {
            isFlashing = true; score = Math.max(0, score - 3); playSound(100, 'sawtooth', 0.5, -50);
            let f = 0; const inv = setInterval(() => {
                document.body.classList.toggle('flash-red');
                if (++f === 6) { clearInterval(inv); document.body.classList.remove('flash-red'); isFlashing = false; }
            }, 100);
            items.filter(i => i.type === 'water').forEach(w => respawnItem(w));
        }

        function respawnItem(item) {
            item.x = Math.random() * (window.innerWidth - 60) + 30; item.y = Math.random() * (window.innerHeight - 150) + 75;
        }

        startBtn.onclick = () => {
            audioCtx.resume(); score = 0; scoreEl.innerText = 0; timeLeft = 60; timerEl.innerText = 60;
            goldSpawned = false; overlay.style.display = 'none'; active = true; 
            items.forEach(i => i.el.remove());
            items = []; for(let i=0; i<3; i++) createItem('yarn', '🧶', 2.5); createItem('water', '💧', 1.8);
            spawnTrees();
            const t = setInterval(() => { if(active && !isFlashing) { timeLeft--; timerEl.innerText = timeLeft; if(timeLeft <= 0) { clearInterval(t); endGame(); } } }, 1000);
        };

        function endGame() {
            active = false;
            setTimeout(() => {
                statsDisplay.innerHTML = `60s SCORE: ${score}`;
                mainMenu.style.display = 'block';
                startBtn.innerText = "CAT REACTIONS";
                startBtn.onclick = startWiz;
                overlay.style.display = 'flex';
            }, 2000);
        }

        function startWiz() {
            mainMenu.style.display = 'none';
            wizBox.style.display = 'block';
            wizActive = true;
            wizCountdown = 5;
            wizTimerEl.innerText = `HURRY: ${wizCountdown}s`;
            wizInterval = setInterval(() => {
                wizCountdown--;
                wizTimerEl.innerText = `HURRY: ${wizCountdown}s`;
                if(wizCountdown <= 0) {
                    clearInterval(wizInterval);
                    if(wizActive) wizMissed();
                }
            }, 1000);
        }

        function wizMissed() {
            wizActive = false;
            currentBonus = 0;
            wizBox.style.display = 'none';
            showFinalMenu();
        }

        document.getElementById('wiz-stop').onclick = () => {
            clearInterval(wizInterval);
            wizActive = false;
            if (leverPos >= 110 && leverPos <= 190) {
                currentBonus = 10;
                playVictory();
                document.body.classList.add('shake');
                setTimeout(() => document.body.classList.remove('shake'), 500);
            }
            else if ((leverPos >= 40 && leverPos < 110) || (leverPos > 190 && leverPos <= 260)) currentBonus = 5;
            else currentBonus = 0;
            
            wizBox.style.display = 'none';
            prizeText.innerText = `REACTION BONUS: +${currentBonus}!`;
            prizeStage.style.display = 'flex';
        };

        window.claimPrize = (el) => {
            playRegisterDing();
            el.classList.add('expand-out');
            setTimeout(() => {
                score += currentBonus;
                scoreEl.innerText = score;
                videoCont.style.display = 'flex'; video.play();
                setTimeout(() => { video.pause(); videoCont.style.display = 'none'; showFinalMenu(); }, 6000);
            }, 600);
        };

        function showFinalMenu() {
            if(score > highScore) { highScore = score; localStorage.setItem('pt_deluxe_score', score); }
            statsDisplay.innerHTML = `FINAL TOTAL: ${score}<br>BEST: ${highScore}`;
            prizeStage.style.display = 'none';
            mainMenu.style.display = 'block';
            startBtn.innerText = "PLAY AGAIN";
            startBtn.onclick = () => location.reload();
            overlay.style.display = 'flex';
            if(!document.getElementById('sh-btn')) {
                const s = document.createElement('button'); s.className='btn btn-share'; s.id='sh-btn'; s.style.background='#008CBA'; s.innerText='SHARE';
                s.onclick = () => {
                    const txt = `🐈 Can you beat me? I got 🧶 ${score} in PussyTilt!`;
                    navigator.share ? navigator.share({title:'PussyTilt', text:txt, url:window.location.href}) : alert("Copied!");
                };
                document.getElementById('main-menu').appendChild(s);
            }
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
