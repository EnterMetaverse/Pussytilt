<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PussyTilt: Final Fix</title>
    <style>
        /* Strict Mobile Viewport Lock */
        html, body { width: 100vw; height: 100vh; margin: 0; padding: 0; overflow: hidden; position: fixed; background-color: #7cb342; background-image: radial-gradient(#ffffff 2px, transparent 2px), radial-gradient(#f9ca24 2px, transparent 2px); background-size: 50px 50px; background-position: 0 0, 25px 25px; font-family: sans-serif; touch-action: none; user-select: none; -webkit-user-select: none; }
        
        /* The Solid Scoreboard */
        #game-ui { position: absolute; top: 0; left: 0; width: 100%; height: 60px; background: rgba(0, 0, 0, 0.9); border-bottom: 4px solid #f9ca24; display: flex; justify-content: space-around; align-items: center; font-size: 24px; z-index: 9999; color: white; font-weight: bold; box-sizing: border-box; }
        
        /* Game Elements */
        #game-area { position: absolute; top: 60px; left: 0; width: 100%; height: calc(100vh - 60px); overflow: hidden; }
        .sprite { position: absolute; display: flex; justify-content: center; align-items: center; transform: translate(-50%, -50%); }
        #cat { font-size: 70px; z-index: 5; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.4)); transition: opacity 0.2s; }
        .tree { font-size: 110px; z-index: 2; }
        .yarn { font-size: 60px; z-index: 3; }
        .water { font-size: 30px; z-index: 3; }
        .fishbone { font-size: 50px; z-index: 3; }

        /* Overlays & Menus */
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 10000; text-align: center; }
        .btn { padding: 15px 30px; font-size: 22px; border-radius: 50px; border: none; color: white; margin: 10px; font-weight: bold; width: 260px; cursor: pointer; background: #4CAF50; }
        #title { font-size: 55px; color: #f9ca24; margin-bottom: 10px; }
        
        /* UI Boxes */
        .box { background: #2c3e50; padding: 20px; border-radius: 20px; border: 4px solid #f9ca24; margin-bottom: 20px; display: none; width: 90%; max-width: 350px; box-sizing: border-box; }
        #lever-track { width: 100%; height: 40px; background: #444; border-radius: 10px; position: relative; margin: 20px 0; overflow: hidden; border: 3px solid #666;}
        .zone { height: 100%; position: absolute; }
        #apple { font-size: 35px; position: absolute; top: -2px; z-index: 10; left: 0; }
        .flash-red { background: #e74c3c !important; }
        
        .diamond-row { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
        .diamond { font-size: 60px; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        
        #video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; display: none; z-index: 10001; }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="game-ui">
        <div>⏳ <span id="timer">30</span></div>
        <div>🧶 <span id="score">0</span></div>
    </div>

    <div id="game-area">
        <div id="cat" class="sprite">🐈</div>
    </div>

    <div id="video-container"><video id="end-video" playsinline muted><source src="https://videos.pexels.com/video-files/3015488/3015488-uhd_2560_1440_24fps.mp4" type="video/mp4"></video></div>

    <div id="overlay">
        <div id="main-menu">
            <h1 id="title">PussyTilt</h1>
            <p id="stats-display" style="font-size: 20px; margin-bottom: 20px;">Ready to hunt?</p>
            <button class="btn" id="btn-start">START YARN HUNT</button>
        </div>

        <div id="wiz-box" class="box">
            <h2 style="color:#f9ca24; margin: 0 0 10px 0;">APPLE GRAB!</h2>
            <p id="wiz-timer" style="color:#e74c3c; font-weight: bold; margin: 0;">5s REMAINING</p>
            <div id="lever-track">
                <div class="zone" style="background:#e74c3c; width:15%; left:0;"></div>
                <div class="zone" style="background:#f1c40f; width:20%; left:15%;"></div>
                <div class="zone" style="background:#2ecc71; width:30%; left:35%;"></div>
                <div class="zone" style="background:#f1c40f; width:20%; left:65%;"></div>
                <div class="zone" style="background:#e74c3c; width:15%; right:0;"></div>
                <div id="apple">🍏</div>
            </div>
            <button class="btn" style="background:#3498db; width: 100%; margin: 0;" id="btn-stop-apple">STOP!</button>
        </div>

        <div id="prize-box" class="box">
            <h2 id="prize-text" style="color:#f9ca24; margin: 0;">BONUS CLAIM</h2>
            <div class="diamond-row">
                <div class="diamond" onclick="claimDiamond()">💎</div>
                <div class="diamond" onclick="claimDiamond()">💎</div>
                <div class="diamond" onclick="claimDiamond()">💎</div>
            </div>
        </div>

        <div id="end-btns" style="display:none;">
            <button class="btn" id="btn-replay" onclick="location.reload()">PLAY AGAIN</button>
            <button class="btn" id="btn-share" style="background:#008CBA">SHARE</button>
            <button class="btn" id="btn-donate" style="background:#e67e22" onclick="window.open('https://paypal.me/yourlink','_blank')">DONATE</button>
        </div>
    </div>

    <script>
        // DOM Elements
        const cat = document.getElementById('cat');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const gameArea = document.getElementById('game-area');
        const overlay = document.getElementById('overlay');
        const statsDisplay = document.getElementById('stats-display');
        
        // State
        let score = 0, timeLeft = 0, active = false, mode = "";
        let gameTimer = null;
        let waterCooldown = false;
        
        // Physics (Cat severely slowed down)
        let catX = window.innerWidth / 2, catY = window.innerHeight / 2;
        let velX = 0, velY = 0;
        let tiltX = 0, tiltY = 0;
        const catRadius = 35; 
        
        // Arrays for items (We will teleport them, not delete them)
        let items = [];
        let trees = [];

        // Audio System (Safe)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(f, t, d) {
            try {
                if(audioCtx.state === 'suspended') audioCtx.resume();
                const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                o.type = t; o.frequency.value = f;
                g.gain.setValueAtTime(0.1, audioCtx.currentTime); 
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+d);
                o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+d);
            } catch(e) { console.log("Audio skipped"); }
        }

        // --- GAMEPLAY SETUP ---
        function clearBoard() {
            items.forEach(i => i.el.remove()); items = [];
            trees.forEach(t => t.el.remove()); trees = [];
        }

        function createItem(type, emoji, speed, radius) {
            const el = document.createElement('div');
            el.className = 'sprite ' + type; el.innerHTML = emoji;
            gameArea.appendChild(el);
            let obj = { el, type, speed, radius, x: 0, y: 0, dx: (Math.random()-0.5)*speed, dy: (Math.random()-0.5)*speed };
            teleportItem(obj);
            items.push(obj);
        }

        function teleportItem(item) {
            // Safe coordinates inside the game-area
            item.x = Math.random() * (window.innerWidth - (item.radius*2)) + item.radius;
            item.y = Math.random() * (gameArea.clientHeight - (item.radius*2)) + item.radius;
        }

        function spawnTrees() {
            for(let i=0; i<4; i++) {
                const el = document.createElement('div'); el.className = 'sprite tree'; el.innerHTML = '🌲';
                gameArea.appendChild(el);
                let x = Math.random() * (window.innerWidth - 100) + 50;
                let y = Math.random() * (gameArea.clientHeight - 100) + 50;
                el.style.left = x + 'px'; el.style.top = y + 'px';
                trees.push({el, x, y});
            }
        }

        // --- TILT SENSOR (Dampened) ---
        window.addEventListener('deviceorientation', (e) => {
            if (!active) return;
            // 70% Slower: Multiplier reduced to 0.01 (was 0.04)
            tiltX = Math.max(-45, Math.min(45, e.gamma)) * 0.01; 
            tiltY = Math.max(-45, Math.min(45, e.beta)) * 0.01;
        });

        // --- CORE PHYSICS LOOP ---
        function gameLoop() {
            if (active) {
                // 1. Cat Physics
                velX += tiltX; velY += tiltY;
                velX *= 0.85; velY *= 0.85; // High friction so it doesn't slide like ice
                
                let nextX = catX + velX; let nextY = catY + velY;

                // 2. Tree Collision
                let hitTree = false;
                trees.forEach(t => {
                    if (Math.hypot(nextX - t.x, nextY - t.y) < 70) hitTree = true;
                });
                if (!hitTree) { catX = nextX; catY = nextY; }

                // 3. IRON BOUNDARIES (Bouncing off walls safely)
                if (catX <= catRadius) { catX = catRadius; velX *= -0.7; } // Bounce left
                if (catX >= window.innerWidth - catRadius) { catX = window.innerWidth - catRadius; velX *= -0.7; } // Bounce right
                if (catY <= catRadius) { catY = catRadius; velY *= -0.7; } // Bounce top
                if (catY >= gameArea.clientHeight - catRadius) { catY = gameArea.clientHeight - catRadius; velY *= -0.7; } // Bounce bottom
                
                cat.style.left = catX + 'px'; cat.style.top = catY + 'px';

                // 4. Move & Bounce Items
                items.forEach(item => {
                    item.x += item.dx; item.y += item.dy;
                    if (item.x <= item.radius || item.x >= window.innerWidth - item.radius) item.dx *= -1;
                    if (item.y <= item.radius || item.y >= gameArea.clientHeight - item.radius) item.dy *= -1;
                    item.el.style.left = item.x + 'px'; item.el.style.top = item.y + 'px';

                    // 5. Collisions (Teleporting instead of deleting!)
                    if (Math.hypot(catX - item.x, catY - item.y) < (catRadius + item.radius - 10)) {
                        if (item.type === 'yarn') {
                            score++; scoreEl.textContent = score; playSfx(600,'sine',0.2);
                            teleportItem(item); // Fixes the missing yarn bug immediately
                        } 
                        else if (item.type === 'fishbone') {
                            score++; scoreEl.textContent = score; playSfx(800,'triangle',0.2);
                            teleportItem(item);
                        } 
                        else if (item.type === 'water' && !waterCooldown) {
                            score = Math.max(0, score-3); scoreEl.textContent = score; playSfx(150,'sawtooth',0.4);
                            waterCooldown = true; cat.style.opacity = '0.3';
                            document.body.classList.add('flash-red'); setTimeout(()=>document.body.classList.remove('flash-red'),100);
                            setTimeout(() => { waterCooldown = false; cat.style.opacity = '1'; }, 1000); // 1 sec invincibility
                        }
                    }
                });
            }
            requestAnimationFrame(gameLoop);
        }
        requestAnimationFrame(gameLoop); // Start engine

        // --- SEQUENCE 1: YARN HUNT (30s) ---
        document.getElementById('btn-start').onclick = () => {
            audioCtx.resume();
            document.getElementById('main-menu').style.display = 'none';
            overlay.style.display = 'none';
            
            clearBoard(); spawnTrees();
            for(let i=0; i<3; i++) createItem('yarn', '🧶', 2, 30); // 3 Yarns
            createItem('water', '💧', 1.5, 15); // 1 Water

            score = 0; scoreEl.textContent = score;
            timeLeft = 30; timerEl.textContent = timeLeft;
            catX = window.innerWidth/2; catY = gameArea.clientHeight/2; velX = 0; velY = 0;
            
            active = true; mode = "yarn";
            
            gameTimer = setInterval(() => {
                timeLeft--; timerEl.textContent = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(gameTimer); active = false;
                    startMetronome();
                }
            }, 1000);
        };

        // --- SEQUENCE 2: METRONOME (5s) ---
        let applePos = 0, appleDir = 1, wizTimer = null, wizActive = false;
        
        function startMetronome() {
            overlay.style.display = 'flex';
            document.getElementById('wiz-box').style.display = 'block';
            
            let c = 5; document.getElementById('wiz-timer').textContent = `HURRY! ${c}s`;
            wizActive = true;
            
            // Apple Animation loop
            let appleLoop = setInterval(() => {
                if(!wizActive) return clearInterval(appleLoop);
                applePos += 4 * appleDir;
                if(applePos >= document.getElementById('lever-track').clientWidth - 35 || applePos <= 0) appleDir *= -1;
                document.getElementById('apple').style.left = applePos + 'px';
            }, 20);

            wizTimer = setInterval(() => {
                c--; document.getElementById('wiz-timer').textContent = `HURRY! ${c}s`;
                if(c <= 0) { clearInterval(wizTimer); resolveApple(0); } // Time out = 0 points
            }, 1000);
        }

        document.getElementById('btn-stop-apple').onclick = () => {
            clearInterval(wizTimer);
            let trackWidth = document.getElementById('lever-track').clientWidth;
            let percent = applePos / trackWidth;
            let bonus = 0;
            
            // 0-15% (Red), 15-35% (Yellow), 35-65% (Green), 65-85% (Yellow), 85-100% (Red)
            if (percent >= 0.35 && percent <= 0.65) bonus = 10;
            else if ((percent >= 0.15 && percent < 0.35) || (percent > 0.65 && percent <= 0.85)) bonus = 5;
            
            resolveApple(bonus);
        };

        let pendingBonus = 0;
        function resolveApple(bonus) {
            wizActive = false; pendingBonus = bonus;
            document.getElementById('wiz-box').style.display = 'none';
            document.getElementById('prize-text').textContent = `YOU WON ${bonus} YARNS!`;
            document.getElementById('prize-box').style.display = 'block';
        }

        // --- SEQUENCE 3: DIAMOND PRIZE -> FISHBONE ---
        window.claimDiamond = () => {
            playSfx(1000, 'sine', 0.5);
            document.getElementById('prize-box').style.display = 'none';
            
            score += pendingBonus; scoreEl.textContent = score;
            startFishbone();
        };

        // --- SEQUENCE 4: FISHBONE BLITZ (10s) ---
        function startFishbone() {
            overlay.style.display = 'none';
            clearBoard(); // Clear trees and yarn
            for(let i=0; i<4; i++) createItem('fishbone', '🦴', 3.5, 25);
            
            timeLeft = 10; timerEl.textContent = timeLeft;
            catX = window.innerWidth/2; catY = gameArea.clientHeight/2; velX = 0; velY = 0;
            active = true; mode = "fish";
            
            gameTimer = setInterval(() => {
                timeLeft--; timerEl.textContent = timeLeft;
                if(timeLeft <= 0) {
                    clearInterval(gameTimer); active = false;
                    playVideo();
                }
            }, 1000);
        }

        // --- SEQUENCE 5: VIDEO & END ---
        function playVideo() {
            const vc = document.getElementById('video-container');
            const vid = document.getElementById('end-video');
            vc.style.display = 'flex';
            try { vid.play(); } catch(e) {} // Failsafe for mobile video policies
            
            setTimeout(() => {
                vid.pause(); vc.style.display = 'none';
                showFinalScreen();
            }, 6000);
        }

        function showFinalScreen() {
            overlay.style.display = 'flex';
            document.getElementById('main-menu').style.display = 'block';
            document.getElementById('title').textContent = "GAME OVER";
            document.getElementById('stats-display').innerHTML = `FINAL SCORE: ${score}<br>🧶`;
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('end-btns').style.display = 'block';

            document.getElementById('btn-share').onclick = () => {
                let txt = `🐈 Can you beat me? I got 🧶 ${score} in PussyTilt!`;
                if(navigator.share) navigator.share({text: txt}); else alert("Copied!");
            };
        }
    </script>
</body>
</html>
