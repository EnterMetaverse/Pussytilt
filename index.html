<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roaming Cat Game</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #a2d149; font-family: sans-serif; touch-action: none; transition: background-color 0.1s; }
        #game-ui { position: fixed; top: 10px; width: 100%; display: flex; justify-content: space-around; font-weight: bold; font-size: 22px; z-index: 10; color: white; text-shadow: 2px 2px 4px #000; }
        .sprite { position: absolute; display: flex; justify-content: center; align-items: center; transition: transform 0.1s linear; }
        #cat { font-size: 60px; z-index: 5; }
        #msg { position: fixed; top: 50%; width: 100%; text-align: center; font-size: 30px; display: none; background: rgba(0,0,0,0.8); color: white; padding: 20px 0; z-index: 20; }
        .tree { font-size: 100px; z-index: 2; opacity: 1; transition: opacity 0.3s; }
        .yarn { font-size: 40px; }
        .water { font-size: 50px; }
        .flash { background-color: white !important; }
    </style>
</head>
<body>

    <div id="game-ui">
        <div>Time: <span id="timer">60</span></div>
        <div>Score: <span id="score">0</span></div>
    </div>

    <div id="msg">TAP TO START</div>
    <div id="cat" class="sprite">🐈</div>

    <script>
        const cat = document.getElementById('cat');
        const scoreEl = document.getElementById('score');
        const timerEl = document.getElementById('timer');
        const msg = document.getElementById('msg');

        let score = 0;
        let timeLeft = 60;
        let active = false;
        let isFlashing = false;
        
        let catX = window.innerWidth / 2;
        let catY = window.innerHeight / 2;
        let items = []; // Stores yarn and water
        let trees = [];

        function init() {
            // Create 5 Yarn (speed ~2-3)
            for(let i=0; i<5; i++) createRoamingItem('yarn', '🧶', 2.5);
            // Create 1 Water (speed ~1.5)
            createRoamingItem('water', '💧', 1.5);
            // Create 5 Huge Trees
            spawnTrees();
            
            msg.style.display = 'block';
            requestAnimationFrame(gameLoop);
        }

        function createRoamingItem(type, emoji, speed) {
            const el = document.createElement('div');
            el.className = 'sprite ' + type;
            el.innerHTML = emoji;
            document.body.appendChild(el);
            
            items.push({
                el: el,
                type: type,
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                dx: (Math.random() - 0.5) * speed,
                dy: (Math.random() - 0.5) * speed
            });
        }

        function spawnTrees() {
            trees.forEach(t => t.el.remove());
            trees = [];
            for(let i=0; i<5; i++) {
                const el = document.createElement('div');
                el.className = 'sprite tree';
                el.innerHTML = '🌲';
                document.body.appendChild(el);
                
                // Ensure trees are spread out (at least 120px apart)
                let tx, ty;
                let overlap = true;
                while(overlap) {
                    tx = Math.random() * (window.innerWidth - 100);
                    ty = Math.random() * (window.innerHeight - 200) + 100;
                    overlap = trees.some(t => Math.hypot(tx - t.x, ty - t.y) < 120);
                }
                
                el.style.left = tx + 'px';
                el.style.top = ty + 'px';
                trees.push({el, x: tx, y: ty});
            }
        }

        // Handle Tilt
        window.addEventListener('deviceorientation', (e) => {
            if (!active || isFlashing) return;
            let nextX = catX + (e.gamma * 0.9);
            let nextY = catY + (e.beta * 0.9);

            // Tree collision
            let hitTree = trees.some(t => Math.hypot(nextX - t.x, nextY - t.y) < 60);
            if (!hitTree) {
                catX = Math.max(0, Math.min(window.innerWidth - 60, nextX));
                catY = Math.max(60, Math.min(window.innerHeight - 60, nextY));
                cat.style.left = catX + 'px';
                cat.style.top = catY + 'px';
            }
        });

        function gameLoop() {
            if (active && !isFlashing) {
                items.forEach(item => {
                    // Move
                    item.x += item.dx;
                    item.y += item.dy;

                    // Bounce off walls
                    if (item.x <= 0 || item.x >= window.innerWidth - 40) item.dx *= -1;
                    if (item.y <= 60 || item.y >= window.innerHeight - 40) item.dy *= -1;

                    item.el.style.left = item.x + 'px';
                    item.el.style.top = item.y + 'px';

                    // Collisions
                    let dist = Math.hypot(catX - item.x, catY - item.y);
                    if (dist < 50) {
                        if (item.type === 'yarn') {
                            score++;
                            respawnItem(item);
                        } else if (item.type === 'water') {
                            triggerWaterHit();
                        }
                        scoreEl.innerText = score;
                    }
                });
            }
            requestAnimationFrame(gameLoop);
        }

        function triggerWaterHit() {
            isFlashing = true;
            score = Math.max(0, score - 3);
            
            // Fade trees out
            trees.forEach(t => t.el.style.opacity = '0');

            // Flash effect (3 times)
            let flashes = 0;
            let interval = setInterval(() => {
                document.body.classList.toggle('flash');
                flashes++;
                if (flashes === 6) {
                    clearInterval(interval);
                    document.body.classList.remove('flash');
                    spawnTrees(); // Reaper trees elsewhere
                    isFlashing = false;
                }
            }, 150);

            // Move the water away immediately
            items.filter(i => i.type === 'water').forEach(w => respawnItem(w));
        }

        function respawnItem(item) {
            item.x = Math.random() * (window.innerWidth - 50);
            item.y = Math.random() * (window.innerHeight - 100) + 60;
        }

        msg.onclick = () => {
            if (timeLeft <= 0) location.reload();
            active = true;
            msg.style.display = 'none';
            setInterval(() => {
                if(active && !isFlashing) {
                    timeLeft--;
                    timerEl.innerText = timeLeft;
                    if (timeLeft <= 0) {
                        active = false;
                        msg.innerHTML = "FINAL SCORE: " + score + "<br>TAP TO RESTART";
                        msg.style.display = 'block';
                    }
                }
            }, 1000);
        };

        init();
    </script>
</body>
</html>
